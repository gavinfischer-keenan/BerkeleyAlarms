  #   name: "Irrigation Insight"
  #   trigger_topic: "home/alerts/insight/irrigation"
  #   severity: "info"
  #   priority: "low"
  #   tts_template: "{location}"          # unused — alexa not in channels
  #   repeat_interval_sec: 0
  #   channels: [rotating_screen]
  #   auto_resolve:
  #     timeout_sec: 86400


